appId: ai.sourcehero.desktop
productName: SourceHero
copyright: Copyright © 2025 SourceHero
directories:
  buildResources: build
  output: dist

# Files that ship inside the asar / app bundle.
files:
  - main.js
  - package.json
  - scripts/**/*
  - "!node_modules/**/*"

# Native + Python runtime + Python source ship as extra resources next to the app.
extraResources:
  - from: runtime
    to: runtime
    filter: ["**/*"]
  - from: ../app
    to: app
    filter: ["**/*", "!**/__pycache__/**"]
  - from: ../dashboard
    to: dashboard
    filter: ["**/*", "!**/__pycache__/**"]
  - from: ../pyproject.toml
    to: pyproject.toml

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: SourceHero-${version}-${arch}.dmg
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: SourceHero-Setup-${version}.exe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target:
    - AppImage
  category: Office
  artifactName: SourceHero-${version}.AppImage
